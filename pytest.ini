[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    -ra
markers =
    local_path: Tests of local confusion matrix path
    coco_path: Tests of COCO-backed mAP integration
    integration: Integration tests with real datasets
    coco_numerical: Numerical equivalence tests vs COCO API
